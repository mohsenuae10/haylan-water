name: Build and Submit iOS to TestFlight

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-submit-ios:
    name: Build and Submit iOS to TestFlight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write App Store Connect API Key
        env:
          ASC_API_KEY: ${{ secrets.ASC_API_KEY }}
        run: |
          echo "$ASC_API_KEY" > AuthKey_M2TYDG9BL3.p8
          chmod 600 AuthKey_M2TYDG9BL3.p8

      - name: Push App Store metadata and screenshots
        run: eas metadata:push --non-interactive

      - name: Build iOS app
        run: eas build --platform ios --profile production --non-interactive

      - name: Submit iOS app to TestFlight
        run: eas submit --platform ios --profile testflight --non-interactive --latest
